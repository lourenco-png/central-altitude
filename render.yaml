services:
  - type: web
    name: central-altitude-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_BASE_URL
        value: "https://central-altitude.onrender.com"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Keep-alive: faz ping na API a cada 5 min para evitar cold start no free tier
  - type: cron
    name: api-keep-alive
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: echo "ok"
    startCommand: node -e "require('https').get('https://central-altitude.onrender.com/health',r=>{console.log('ping ok',r.statusCode)}).on('error',e=>{console.error('ping falhou:',e.message);process.exit(1)})"
