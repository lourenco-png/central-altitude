services:
  - type: web
    name: central-altitude-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_BASE_URL
        value: "https://central-altitude.onrender.com"
      - key: CLOUDINARY_CLOUD_NAME
        value: dgowmqdkk
      - key: CLOUDINARY_API_KEY
        value: "352979691142268"
      - key: CLOUDINARY_API_SECRET
        value: "jIDdpyth7Hl2YJBCIoqNy0l0bs0"

  # Keep-alive: faz ping na API a cada 13 min para evitar cold start no free tier
  - type: cron
    name: api-keep-alive
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: echo "ok"
    startCommand: node -e "require('https').get('https://central-altitude.onrender.com/health',r=>{console.log('ping',r.statusCode)}).on('error',e=>console.error(e.message))"
