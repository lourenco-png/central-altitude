services:
  - type: web
    name: central-altitude-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_BASE_URL
        value: "https://central-altitude.onrender.com"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Keep-alive: faz ping na API a cada 5 min para evitar cold start no free tier
  - type: cron
    name: api-keep-alive
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: echo "ok"
    startCommand: node -e "require('https').get('https://central-altitude.onrender.com/health',r=>{console.log('ping ok',r.statusCode)}).on('error',e=>{console.error('ping falhou:',e.message);process.exit(1)})"

  # Backup diário do banco às 02:00 UTC com upload para Cloudflare R2
  - type: cron
    name: db-backup-daily
    runtime: docker
    dockerfilePath: ./scripts/Dockerfile.backup
    schedule: "0 2 * * *"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: central-altitude
